name: pkgdown

on:
  push:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  pkgdown:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: r-lib/actions/setup-r@v2
        with:
          use-public-rspm: true

      - uses: r-lib/actions/setup-r-dependencies@v2
        with:
          extra-packages: |
            local::.
            any::pkgdown
            any::rmarkdown
            any::knitr
            any::shiny
            any::bslib
            any::dplyr
            any::lubridate
            any::ggplot2
            any::DT
            any::readr
            any::tidyr
            any::tibble
            any::rlang
            any::RColorBrewer
            any::ggridges
            any::rdwd
          needs: website

      - name: Build pkgdown site
        run: pkgdown::build_site(new_process = FALSE, install = FALSE)
        shell: Rscript {0}

      - name: Deploy to GitHub Pages
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: docs
          branch: gh-pages