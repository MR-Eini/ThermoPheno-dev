name: DWD validation

on:
  workflow_dispatch:
  schedule:
    - cron: '0 4 1 */3 *'

jobs:
  dwd-validation:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: r-lib/actions/setup-r@v2
        with:
          use-public-rspm: true
      - uses: r-lib/actions/setup-r-dependencies@v2
        with:
          extra-packages: local::., any::readr, any::dplyr, any::lubridate, any::ggplot2, any::tidyr, any::tibble
      - name: Run DWD validation
        run: source("validation/dwd_validate_thermopheno.R")
        shell: Rscript {0}
      - name: Upload validation results
        uses: actions/upload-artifact@v4
        with:
          name: dwd-validation-results
          path: validation/results
